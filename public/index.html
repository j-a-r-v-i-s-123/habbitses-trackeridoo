<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habittracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      padding: 2rem;
      width: 100%;
      max-width: 600px;
      height: fit-content;
    }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.5rem; }
    h2 { font-size: 1.2rem; margin-bottom: 1rem; }
    .subtitle { text-align: center; color: #888; margin-bottom: 1.5rem; font-size: 0.9rem; }
    .tabs {
      display: flex;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid #eee;
    }
    .tab {
      flex: 1;
      padding: 0.75rem;
      text-align: center;
      cursor: pointer;
      border: none;
      background: none;
      font-size: 1rem;
      color: #888;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }
    .tab.active { color: #5b4fcf; border-bottom-color: #5b4fcf; font-weight: 600; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.25rem; font-size: 0.875rem; font-weight: 500; }
    input, select, textarea {
      width: 100%;
      padding: 0.625rem 0.75rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #5b4fcf; }
    input.error { border-color: #e74c3c; }
    textarea { resize: vertical; min-height: 60px; }
    .error-text { color: #e74c3c; font-size: 0.8rem; margin-top: 0.25rem; }
    .btn {
      padding: 0.625rem 1.25rem;
      background: #5b4fcf;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #4a3fbf; }
    .btn:disabled { background: #b0a8e6; cursor: not-allowed; }
    .btn-full { width: 100%; margin-top: 0.5rem; }
    .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.8rem; }
    .btn-outline { background: transparent; color: #5b4fcf; border: 1px solid #5b4fcf; }
    .btn-outline:hover { background: #f0eeff; }
    .btn-danger { background: #e74c3c; }
    .btn-danger:hover { background: #c0392b; }
    .btn-secondary { background: #95a5a6; }
    .btn-secondary:hover { background: #7f8c8d; }
    .alert { padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.875rem; }
    .alert-error { background: #fde8e8; color: #c0392b; }
    .alert-success { background: #e8fde8; color: #27ae60; }
    .hidden { display: none; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .header h1 { margin-bottom: 0; text-align: left; }
    .header-actions { display: flex; gap: 0.5rem; align-items: center; }
    .user-badge { font-size: 0.8rem; color: #888; }
    .habit-list { list-style: none; }
    .habit-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem;
      border: 1px solid #eee;
      border-radius: 10px;
      margin-bottom: 0.5rem;
      transition: box-shadow 0.2s;
    }
    .habit-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .habit-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
      color: white;
    }
    .habit-info { flex: 1; min-width: 0; }
    .habit-name { font-weight: 600; font-size: 0.95rem; }
    .habit-desc { color: #888; font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .habit-freq { font-size: 0.75rem; color: #aaa; margin-top: 2px; }
    .habit-actions { display: flex; gap: 0.25rem; flex-shrink: 0; }
    .icon-btn {
      background: none; border: 1px solid #eee; border-radius: 6px; cursor: pointer;
      padding: 0.3rem 0.45rem; font-size: 0.85rem; opacity: 0.6; transition: all 0.2s;
    }
    .icon-btn:hover { opacity: 1; border-color: #ccc; }
    .habit-archived { opacity: 0.5; }
    .empty-state { text-align: center; padding: 2rem; color: #aaa; }
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 1rem;
    }
    .modal {
      background: white; border-radius: 12px; padding: 1.5rem;
      width: 100%; max-width: 450px; max-height: 90vh; overflow-y: auto;
    }
    .modal h2 { margin-bottom: 1rem; }
    .modal-actions { display: flex; gap: 0.5rem; margin-top: 1.25rem; }
    .modal-actions .btn { flex: 1; }
    .color-options { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .color-swatch {
      width: 32px; height: 32px; border-radius: 50%;
      border: 3px solid transparent; cursor: pointer; transition: all 0.2s;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: #333; }
    .icon-options { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .icon-option {
      width: 36px; height: 36px; border: 2px solid #eee; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.1rem; transition: all 0.2s; background: white;
    }
    .icon-option:hover { border-color: #bbb; }
    .icon-option.selected { border-color: #5b4fcf; background: #f0eeff; }
    .days-picker { display: flex; gap: 0.375rem; flex-wrap: wrap; }
    .day-toggle {
      padding: 0.375rem 0.625rem; border: 1px solid #ddd; border-radius: 6px;
      background: white; cursor: pointer; font-size: 0.8rem; transition: all 0.2s;
    }
    .day-toggle.selected { background: #5b4fcf; color: white; border-color: #5b4fcf; }
    .toggle-link {
      font-size: 0.85rem; color: #5b4fcf; cursor: pointer;
      background: none; border: none; margin-bottom: 1rem; display: inline-block;
    }
    .toggle-link:hover { text-decoration: underline; }
    .confirm-text { text-align: center; padding: 1rem 0; font-size: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <div id="auth-section">
      <h1>Habittracker</h1>
      <p class="subtitle">Track your habits, build your life</p>
      <div class="tabs">
        <button class="tab active" data-tab="login">Login</button>
        <button class="tab" data-tab="register">Register</button>
      </div>
      <div id="alert" class="alert hidden"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required>
          <div class="error-text hidden" id="login-email-error"></div>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Your password" required>
          <div class="error-text hidden" id="login-password-error"></div>
        </div>
        <button type="submit" class="btn btn-full" id="login-btn">Login</button>
      </form>
      <form id="register-form" class="hidden">
        <div class="form-group">
          <label for="register-name">Name (optional)</label>
          <input type="text" id="register-name" placeholder="Your name">
        </div>
        <div class="form-group">
          <label for="register-email">Email</label>
          <input type="email" id="register-email" placeholder="you@example.com" required>
          <div class="error-text hidden" id="register-email-error"></div>
        </div>
        <div class="form-group">
          <label for="register-password">Password</label>
          <input type="password" id="register-password" placeholder="Min 8 characters" required>
          <div class="error-text hidden" id="register-password-error"></div>
        </div>
        <div class="form-group">
          <label for="register-confirm">Confirm Password</label>
          <input type="password" id="register-confirm" placeholder="Confirm password" required>
          <div class="error-text hidden" id="register-confirm-error"></div>
        </div>
        <button type="submit" class="btn btn-full" id="register-btn">Create Account</button>
      </form>
    </div>
    <div id="dashboard-section" class="hidden">
      <div class="header">
        <h1>My Habits</h1>
        <div class="header-actions">
          <span class="user-badge" id="user-badge"></span>
          <button class="btn btn-sm" id="add-habit-btn">+ New</button>
          <button class="btn btn-sm btn-secondary" id="logout-btn">Logout</button>
        </div>
      </div>
      <button class="toggle-link" id="toggle-archived">Show archived</button>
      <ul class="habit-list" id="habit-list"></ul>
      <div class="empty-state hidden" id="empty-state">
        <p>No habits yet. Create your first one!</p>
      </div>
    </div>
  </div>
  <div id="modal-root"></div>
  <script src="app.js"></script>
</body>
</html>
